<!-- Tarea de formulario: Crear un formulario de registro para entrar a un sitio web para reservar una hora al doctor
Debe incluir nombre del paciente,fecha de cita,Fecha_nacimiento,sintomas del paciente,ciudad
Casilla de verificación-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea Formularios</title>
</head>
<body>
    <h1>Formulario de cita</h1>
    <hr>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre">
    <br><br>
    <label for="Edad">Edad:</label>
    <input type="number" id="edad" name="edad">
    <br><br>
    <label for="Fecha cita">Fecha cita</label>
    <input type="date" id="Fecha-cita" name="Fecha-cita">
    <br><br>
    <label for="fecha_nacimiento">Fecha de nacimiento:</label>
    <input type="date" id="fecha-nacimiento" name="fecha-nacimiento">
    <br><br>
    <label for="Sintomas">Sintomas</label>
    <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
    <br><br>
    <label for="ciudad">ciudad</label>
        <select id="Ciudad" name="Ciudad">
            <option value="Santiago">Santiago</option>
            <option value="iquique">iquique</option>
            <option value="temunco">temunco</option>
        </select>
    <br><br>
    <input type="checkbox" id="acepto" name="acepto">
    <label for="acepto">Acepto los términos</label>
</body>
</html>
